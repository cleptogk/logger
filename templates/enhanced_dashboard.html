<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Log Viewer - Sports Scheduler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .header {
            background: #2d2d2d;
            padding: 1rem 2rem;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #4CAF50;
            font-size: 1.5rem;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .control-group label {
            font-size: 0.8rem;
            color: #bbb;
        }
        
        select, input, button {
            padding: 0.5rem;
            border: 1px solid #555;
            background: #333;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button.secondary {
            background: #666;
        }
        
        button.secondary:hover {
            background: #777;
        }
        
        .status-bar {
            background: #333;
            padding: 0.5rem 2rem;
            border-bottom: 1px solid #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        .status-dot.error {
            background: #f44336;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .main-content {
            display: flex;
            height: calc(100vh - 120px);
        }
        
        .sidebar {
            width: 300px;
            background: #2d2d2d;
            border-right: 1px solid #555;
            padding: 1rem;
            overflow-y: auto;
        }
        
        .sidebar h3 {
            color: #4CAF50;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: #333;
            padding: 0.75rem;
            border-radius: 4px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #bbb;
        }
        
        .component-filters {
            margin-bottom: 1.5rem;
        }
        
        .component-filter {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .component-filter:hover {
            background: #444;
        }
        
        .component-filter.active {
            background: #4CAF50;
            color: white;
        }
        
        .log-container {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            background: #1a1a1a;
        }
        
        .log-entry {
            background: #2d2d2d;
            margin-bottom: 0.5rem;
            padding: 0.75rem;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .log-entry.error {
            border-left-color: #f44336;
            background: #2d1f1f;
        }
        
        .log-entry.warning {
            border-left-color: #ff9800;
            background: #2d2a1f;
        }
        
        .log-entry.debug {
            border-left-color: #2196F3;
            background: #1f252d;
        }
        
        .log-entry:hover {
            background: #333;
            transform: translateX(2px);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: #bbb;
        }
        
        .log-level {
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.7rem;
        }
        
        .log-level.INFO {
            background: #4CAF50;
            color: white;
        }
        
        .log-level.ERROR {
            background: #f44336;
            color: white;
        }
        
        .log-level.WARNING {
            background: #ff9800;
            color: white;
        }
        
        .log-level.DEBUG {
            background: #2196F3;
            color: white;
        }
        
        .log-message {
            color: #e0e0e0;
            line-height: 1.4;
        }
        
        .refresh-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top: 2px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .no-logs {
            text-align: center;
            color: #666;
            padding: 2rem;
            font-style: italic;
        }
        
        .error-message {
            background: #2d1f1f;
            border: 1px solid #f44336;
            color: #f44336;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        
        /* Smooth transitions for content updates */
        .log-container {
            transition: opacity 0.2s ease;
        }
        
        .log-container.updating {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Enhanced Log Viewer</h1>
        <div class="controls">
            <div class="control-group">
                <label>Host</label>
                <select id="hostSelect">
                    <option value="ssdev">ssdev</option>
                    <option value="ssdvr">ssdvr</option>
                    <option value="ssmcp">ssmcp</option>
                </select>
            </div>
            <div class="control-group">
                <label>App</label>
                <select id="appSelect">
                    <option value="all">All Apps</option>
                    <option value="sports-scheduler">Sports Scheduler</option>
                    <option value="auto-scraper">Auto Scraper</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="control-group">
                <label>Component</label>
                <select id="componentSelect">
                    <option value="">All Components</option>
                    <option value="iptv-orchestrator">IPTV Orchestrator</option>
                    <option value="epg-processor">EPG Processor</option>
                    <option value="channel-scanner">Channel Scanner</option>
                    <option value="automated-recording">Automated Recording</option>
                    <option value="application">Application</option>
                </select>
            </div>
            <div class="control-group">
                <label>Level</label>
                <select id="levelSelect">
                    <option value="">All Levels</option>
                    <option value="ERROR">Error</option>
                    <option value="WARNING">Warning</option>
                    <option value="INFO">Info</option>
                    <option value="DEBUG">Debug</option>
                </select>
            </div>
            <div class="control-group">
                <label>Limit</label>
                <select id="limitSelect">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
            </div>
            <button id="refreshBtn">🔄 Refresh</button>
            <button id="autoRefreshBtn" class="secondary">⏸️ Auto</button>
        </div>
    </div>
    
    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connected to Redis Log API</span>
        </div>
        <div id="lastUpdate">Last updated: Never</div>
    </div>
    
    <div class="main-content">
        <div class="sidebar">
            <h3>📊 Statistics</h3>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="totalLogs">-</div>
                    <div class="stat-label">Total Logs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="errorCount">-</div>
                    <div class="stat-label">Errors</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="warningCount">-</div>
                    <div class="stat-label">Warnings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="responseTime">-</div>
                    <div class="stat-label">Response (ms)</div>
                </div>
            </div>
            
            <h3>🔧 Components</h3>
            <div class="component-filters" id="componentFilters">
                <!-- Component filters will be populated dynamically -->
            </div>
        </div>
        
        <div class="log-container" id="logContainer">
            <div class="no-logs">Select filters and click Refresh to load logs</div>
        </div>
    </div>
    
    <div class="refresh-indicator" id="refreshIndicator">
        <div class="loading">
            <div class="spinner"></div>
            <span>Loading logs...</span>
        </div>
    </div>
    
    <script>
        // Enhanced log viewer with anti-flickering and better performance
        class EnhancedLogViewer {
            constructor() {
                this.autoRefreshEnabled = false;
                this.autoRefreshInterval = null;
                this.lastRefreshTime = null;
                this.isRefreshing = false;
                this.currentData = null;
                
                this.initializeEventListeners();
                this.loadInitialData();
            }
            
            initializeEventListeners() {
                document.getElementById('refreshBtn').addEventListener('click', () => this.refreshLogs());
                document.getElementById('autoRefreshBtn').addEventListener('click', () => this.toggleAutoRefresh());
                
                // Filter change listeners
                ['hostSelect', 'appSelect', 'componentSelect', 'levelSelect', 'limitSelect'].forEach(id => {
                    document.getElementById(id).addEventListener('change', () => this.onFilterChange());
                });
            }
            
            onFilterChange() {
                // Debounce filter changes to prevent excessive requests
                clearTimeout(this.filterChangeTimeout);
                this.filterChangeTimeout = setTimeout(() => {
                    if (!this.isRefreshing) {
                        this.refreshLogs();
                    }
                }, 300);
            }
            
            async loadInitialData() {
                await this.refreshLogs();
            }
            
            async refreshLogs() {
                if (this.isRefreshing) return;
                
                this.isRefreshing = true;
                this.showRefreshIndicator();
                
                try {
                    const params = this.buildQueryParams();
                    const startTime = Date.now();
                    
                    const response = await fetch(`/logger/redis/${params.host}?${params.query}`);
                    const data = await response.json();
                    
                    const responseTime = Date.now() - startTime;
                    
                    if (response.ok) {
                        this.updateUI(data, responseTime);
                        this.updateStatus('success', 'Connected to Redis Log API');
                    } else {
                        throw new Error(data.error || 'Failed to fetch logs');
                    }
                    
                } catch (error) {
                    this.updateStatus('error', `Error: ${error.message}`);
                    this.showError(error.message);
                } finally {
                    this.isRefreshing = false;
                    this.hideRefreshIndicator();
                    this.lastRefreshTime = new Date();
                    this.updateLastUpdateTime();
                }
            }
            
            buildQueryParams() {
                const host = document.getElementById('hostSelect').value;
                const app = document.getElementById('appSelect').value;
                const component = document.getElementById('componentSelect').value;
                const level = document.getElementById('levelSelect').value;
                const limit = document.getElementById('limitSelect').value;
                
                const params = new URLSearchParams();
                if (app !== 'all') params.append('app', app);
                if (component) params.append('component', component);
                if (level) params.append('level', level);
                params.append('limit', limit);
                
                return {
                    host: host,
                    query: params.toString()
                };
            }
            
            updateUI(data, responseTime) {
                // Prevent flickering by only updating if data actually changed
                const dataHash = JSON.stringify(data);
                if (this.currentDataHash === dataHash) {
                    return;
                }
                this.currentDataHash = dataHash;
                
                this.updateStats(data, responseTime);
                this.updateLogs(data.logs || []);
                this.currentData = data;
            }
            
            updateStats(data, responseTime) {
                document.getElementById('totalLogs').textContent = data.total || 0;
                document.getElementById('responseTime').textContent = responseTime;
                
                // Count log levels
                const logs = data.logs || [];
                const errorCount = logs.filter(log => log.level === 'ERROR').length;
                const warningCount = logs.filter(log => log.level === 'WARNING').length;
                
                document.getElementById('errorCount').textContent = errorCount;
                document.getElementById('warningCount').textContent = warningCount;
            }
            
            updateLogs(logs) {
                const container = document.getElementById('logContainer');
                
                if (!logs || logs.length === 0) {
                    container.innerHTML = '<div class="no-logs">No logs found for the selected filters</div>';
                    return;
                }
                
                // Use DocumentFragment for better performance
                const fragment = document.createDocumentFragment();
                
                logs.forEach(log => {
                    const logEntry = this.createLogEntry(log);
                    fragment.appendChild(logEntry);
                });
                
                // Replace content smoothly
                container.style.opacity = '0.7';
                setTimeout(() => {
                    container.innerHTML = '';
                    container.appendChild(fragment);
                    container.style.opacity = '1';
                }, 100);
            }
            
            createLogEntry(log) {
                const entry = document.createElement('div');
                entry.className = `log-entry ${log.level.toLowerCase()}`;
                
                const timestamp = new Date(log.timestamp).toLocaleString();
                
                entry.innerHTML = `
                    <div class="log-header">
                        <span>${timestamp}</span>
                        <span class="log-level ${log.level}">${log.level}</span>
                    </div>
                    <div class="log-message">${this.escapeHtml(log.message)}</div>
                `;
                
                return entry;
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            showRefreshIndicator() {
                document.getElementById('refreshIndicator').style.display = 'block';
            }
            
            hideRefreshIndicator() {
                document.getElementById('refreshIndicator').style.display = 'none';
            }
            
            updateStatus(type, message) {
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                statusDot.className = `status-dot ${type === 'error' ? 'error' : ''}`;
                statusText.textContent = message;
            }
            
            updateLastUpdateTime() {
                if (this.lastRefreshTime) {
                    document.getElementById('lastUpdate').textContent = 
                        `Last updated: ${this.lastRefreshTime.toLocaleTimeString()}`;
                }
            }
            
            showError(message) {
                const container = document.getElementById('logContainer');
                container.innerHTML = `<div class="error-message">❌ ${message}</div>`;
            }
            
            toggleAutoRefresh() {
                const btn = document.getElementById('autoRefreshBtn');
                
                if (this.autoRefreshEnabled) {
                    // Disable auto-refresh
                    this.autoRefreshEnabled = false;
                    clearInterval(this.autoRefreshInterval);
                    btn.textContent = '▶️ Auto';
                    btn.className = 'secondary';
                } else {
                    // Enable auto-refresh
                    this.autoRefreshEnabled = true;
                    this.autoRefreshInterval = setInterval(() => {
                        if (!this.isRefreshing) {
                            this.refreshLogs();
                        }
                    }, 30000); // 30 seconds
                    btn.textContent = '⏸️ Auto';
                    btn.className = '';
                }
            }
        }
        
        // Initialize the enhanced log viewer
        document.addEventListener('DOMContentLoaded', () => {
            new EnhancedLogViewer();
        });
    </script>
</body>
</html>
